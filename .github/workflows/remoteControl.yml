name: Remote Control

on:
  workflow_dispatch:

jobs:
  trigger-remote-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Controler
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.Disbatch_Action }}" \
            https://github.com/WehrliDavid/TestModelsRepo/dispatches \
            -d '{"event_type":"update","client_payload":{"ref":"main"}}'
